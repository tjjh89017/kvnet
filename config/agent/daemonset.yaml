apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: agent
  namespace: system
  labels:
    app.kubernetes.io/name: kvnet
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kvnet
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kvnet
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: controller-manager
      hostNetwork: true
      hostPID: true
      tolerations:
        - operator: Exists
      # Disable seccomp filtering so privileged network syscalls are allowed
      # inside the KIND node (or any container-based node) environment.
      securityContext:
        seccompProfile:
          type: Unconfined
      containers:
        - name: agent
          image: controller:latest
          args:
            - --agent
            - --health-probe-bind-address=:8082
          env:
            - name: NODENAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          # Must run as root (uid=0) so that child processes spawned via
          # os/exec (ip, bridge, etc.) inherit Linux capabilities correctly.
          # Non-root uid causes CapEff to drop to zero on exec even with
          # privileged: true.
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
