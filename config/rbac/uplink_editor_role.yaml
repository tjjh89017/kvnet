# This rule is not used by the project kvnet itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the kvnet.kojuro.date.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kvnet
    app.kubernetes.io/managed-by: kustomize
  name: uplink-editor-role
rules:
- apiGroups:
  - kvnet.kojuro.date
  resources:
  - uplinks
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kvnet.kojuro.date
  resources:
  - uplinks/status
  verbs:
  - get
