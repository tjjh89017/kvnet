# This rule is not used by the project kvnet itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to kvnet.kojuro.date resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kvnet
    app.kubernetes.io/managed-by: kustomize
  name: vxlantemplate-viewer-role
rules:
- apiGroups:
  - kvnet.kojuro.date
  resources:
  - vxlantemplates
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kvnet.kojuro.date
  resources:
  - vxlantemplates/status
  verbs:
  - get
