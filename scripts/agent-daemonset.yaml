apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kvnet-agent
  namespace: kvnet-system
  labels:
    app.kubernetes.io/name: kvnet
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kvnet
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kvnet
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: kvnet-controller-manager
      hostNetwork: true
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: kvnet:dev
          args:
            - --agent
            - --health-probe-bind-address=:8082
          env:
            - name: NODENAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
